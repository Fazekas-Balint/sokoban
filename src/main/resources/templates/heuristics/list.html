<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Heurisztikak - Sokoban Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="page-header">
            <h1>Heurisztikak</h1>
            <a href="/heuristics/new" class="btn btn-primary">Uj heurisztika</a>
        </div>

        <div th:if="${#lists.isEmpty(heuristics)}" class="empty-state">
            <p>Meg nincs feltoltott heuristikad. <a href="/heuristics/new">Irj egyet!</a></p>
        </div>

        <table th:unless="${#lists.isEmpty(heuristics)}" class="data-table">
            <thead>
                <tr>
                    <th>Nev</th>
                    <th>Statusz</th>
                    <th>Letrehozva</th>
                    <th>Muveletek</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="h : ${heuristics}">
                    <td>
                        <a th:href="@{/heuristics/{id}(id=${h.id})}" th:text="${h.name}"></a>
                    </td>
                    <td>
                        <span class="status" th:classappend="${h.status.name()}" th:text="${h.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(h.createdAt, 'yyyy.MM.dd HH:mm')}"></td>
                    <td>
                        <a th:href="@{/heuristics/{id}/edit(id=${h.id})}" class="btn btn-small">Szerkesztes</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
