# === Alkalmazas ===
spring.application.name=sokoban-portal
server.port=8080

# === Adatbazis (H2 fejleszteshez) ===
spring.datasource.url=jdbc:h2:file:./data/sokobandb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === Thymeleaf ===
spring.thymeleaf.cache=false

# === Sokoban kiertekeles ===
sokoban.evaluation.max-nodes=100000
sokoban.evaluation.time-limit-ms=5000
sokoban.evaluation.cron=0 */10 * * * *
